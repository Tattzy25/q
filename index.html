<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body { margin: 0; padding: 5px; display: flex; align-items: center; justify-content: center; min-height: 100vh; background: transparent; box-sizing: border-box; }
  @keyframes pulse { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(1.1); } 100% { opacity: 1; transform: scale(1); } }
</style>
</head>
<body>
<div id='inkwell-banner' style='background: linear-gradient(145deg, #0f0f11, #1a1a1c); border: 1px solid #2d2d30; border-radius: 24px; padding: 24px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; color: #e0e0e2; box-shadow: 0 20px 40px rgba(0,0,0,0.5), inset 0 1px 1px rgba(255,255,255,0.05); display: flex; align-items: center; gap: 16px; max-width: 800px; position: relative; overflow: hidden;'>
  <div id='status-dot' style='width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; background: #555; box-shadow: 0 0 10px #555;'></div>
  <h2 id='banner-message' style='margin: 0; font-size: 18px; font-weight: 500; color: #fff;'>Waiting...</h2>
</div>

<script>
  var dot = document.getElementById('status-dot');
  var msg = document.getElementById('banner-message');

  var es = new EventSource('/events');
  es.onmessage = function(e) {
    var data = JSON.parse(e.data);
    if (data.state === 'training') {
      dot.style.background = '#ff9500';
      dot.style.boxShadow = '0 0 10px #ff9500';
      dot.style.animation = 'pulse 1.5s infinite ease-in-out';
      msg.innerHTML = 'Model ' + data.model + ' is currently Training';
    } else if (data.state === 'complete') {
      dot.style.background = '#34c759';
      dot.style.boxShadow = '0 0 10px #34c759';
      dot.style.animation = 'none';
      msg.innerHTML = 'Congratulations, ' + data.model + ' is Well Fed and Battle Ready. <a href="' + data.url + '" style="color:#34c759;">Click Here</a> to Interact with your Model';
    }
  };
</script>
</body>
</html>
